# Shifty — Geração de descrições IA (NVIDIA NIM)
# Corre 1x/dia para produtos sem descrição
# Fase 4

name: Gerar Descrições IA

on:
  schedule:
    - cron: '0 3 * * *'   # 04:00 Lisboa — fora das horas de scrape
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate descriptions
        run: npx tsx scrapers/generate-descriptions.ts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
